      - generic [ref=e28]:
        - paragraph [ref=e29]: May 2, 2024
        - heading "What Happened" [level=1] [ref=e30]
        - paragraph [ref=e31]: The facts of how Yong Yang was killed, where it happened, and the evidence that followed.
      - generic [ref=e32]:
        - heading "How Yong Was Killed" [level=2] [ref=e33]
        - paragraph [ref=e34]: On May 2, 2024, someone called 911 about a mental health crisis involving Yong Yang, a 40-year-old Korean American. LAPD officers responded to the scene — his parents' home in the Koreatown neighborhood of Los Angeles. Within minutes of arrival, officers shot and killed Yong Yang.
        - paragraph [ref=e35]: Yong was experiencing a mental health episode. He posed no lethal threat justifying the use of deadly force. He needed medical care and crisis intervention — not a police response that ended his life.
        - heading "Where It Happened" [level=2] [ref=e36]
        - paragraph [ref=e37]: Yong Yang was killed at his parents' home in Koreatown, Los Angeles — a neighborhood with a dense Korean-American population and one of the highest concentrations of Korean culture outside of Korea.
        - paragraph [ref=e38]: He was killed inside or immediately outside the family home, during what should have been a welfare check or mental health intervention.
        - heading "Body Camera Footage" [level=2] [ref=e39]
        - paragraph [ref=e40]:
          - text: LAPD officers were equipped with body-worn cameras at the time of the shooting. The family filed a legal petition (24STCP02107) to compel the release of this footage. The petition was
          - strong [ref=e41]: granted in March 2025
          - text: .
        - paragraph [ref=e42]: Body camera footage has since been released. It documents the moments leading up to and including the shooting of Yong Yang.
        - paragraph [ref=e43]:
          - link "Read more about the bodycam petition (24STCP02107) →" [ref=e44] [cursor=pointer]:
            - /url: /legal/civil-petition
        - heading "Evidence & Oddities" [level=2] [ref=e45]
        - paragraph [ref=e46]: "The circumstances surrounding Yong Yang's death raise serious questions that his family, legal team, and community advocates continue to investigate and document:"
        - list [ref=e47]:
          - listitem [ref=e48]: Whether LAPD followed its own crisis intervention protocols before resorting to lethal force
          - listitem [ref=e49]: Whether proper de-escalation techniques were attempted
          - listitem [ref=e50]: The timeline between the 911 call and the shooting
          - listitem [ref=e51]: The conduct of individual officers and supervisors present
        - paragraph [ref=e52]:
          - text: These questions form the factual basis of both the
          - link "state civil lawsuit" [ref=e53] [cursor=pointer]:
            - /url: /legal/civil-lawsuit
          - text: and the
          - link "federal civil rights lawsuit" [ref=e54] [cursor=pointer]:
            - /url: /legal/federal-lawsuit
          - text: filed on behalf of Yong's family.
