        - heading "Yong Yang" [level=1] [ref=e13]
        - paragraph [ref=e14]: April 7, 1984 – May 2, 2024
      - generic [ref=e15]:
        - paragraph [ref=e16]: Yong Yang was a 40-year-old Korean American living in the Koreatown neighborhood of Los Angeles. He was a father, a husband, and a member of a community that loved him.
        - heading "The Day He Was Killed" [level=2] [ref=e17]
        - paragraph [ref=e18]: On May 2, 2024, LAPD officers responded to a 911 call related to a mental health crisis. Yong Yang was shot and killed by LAPD officers. At the time of his death, he was experiencing a mental health episode — a medical situation that required care, not lethal force.
        - heading "Who He Was" [level=2] [ref=e19]
        - paragraph [ref=e20]: Yong was known for his warmth, his humor, and his dedication to his family. He immigrated to the United States and built a life in Los Angeles. His loss has devastated his family and a community that refuses to let his death be forgotten.
        - heading "The Fight for Justice" [level=2] [ref=e21]
        - paragraph [ref=e22]: Since his death, Yong's family, friends, and community advocates have organized rallies, filed legal actions, and continued to press for accountability — from the LAPD, from the Los Angeles District Attorney, and from elected officials at every level.
