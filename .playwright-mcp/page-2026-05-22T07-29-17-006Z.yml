      - heading "What Happened" [level=2] [ref=e57]
      - generic [ref=e58]:
        - paragraph [ref=e59]: On May 2, 2024, LAPD officers responded to a mental health crisis call involving Yong Yang, a 40-year-old Korean American living in the Koreatown area of Los Angeles. Yong was shot and killed by LAPD officers. He was unarmed in the way that matters most — he posed no lethal threat that warranted deadly force.
        - paragraph [ref=e60]: His family, community members, and advocates have been fighting ever since for accountability, transparency, and justice — through the courts, through public organizing, and through continued community pressure on the LAPD and the Los Angeles District Attorney's office.
        - paragraph [ref=e61]:
          - text: "Three active legal cases are currently in progress:"
          - link "a civil petition (24STCP02107)" [ref=e62] [cursor=pointer]:
