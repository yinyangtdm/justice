          - text: ","
          - link "a civil lawsuit (24STCV24804)" [ref=e63] [cursor=pointer]:
            - /url: /legal/civil-lawsuit
          - text: ", and"
          - link "a federal civil rights lawsuit (2:26-cv-01014)" [ref=e64] [cursor=pointer]:
            - /url: /legal/federal-lawsuit
          - text: .
